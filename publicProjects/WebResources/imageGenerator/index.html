<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Generators Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .menu-btn {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #00c6ff;
      color: black;
      transition: 0.3s;
    }

    .menu-btn:hover {
      background: #00a6d6;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>AI Image Generator Hub</h1>

    <button class="menu-btn" onclick="goTo('basic.html')">🧩 Versión Básica</button>
    <button class="menu-btn" onclick="goTo('pro.html')">🚀 Versión PRO</button>
    <button class="menu-btn" onclick="goTo('templates.html')">🎯 Versión Templates</button>
    <button class="menu-btn" onclick="goTo('guided.html')">🧠 Versión Guiada</button>

    <div class="footer">Selecciona una versión del generador</div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
