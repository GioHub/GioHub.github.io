<!DOCTYPE html><html><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Plantilla Visual Lorem Ipsum</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
            --body-color: #0f172a;
            --primary-bg-color: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --text-color: #f8fafc;
            --title-color: #ffffff;
            --highlight-color: #38bdf8;
            --primary-highlight-color: #38bdf8;
            --subtitle-color: #cbd5e1;
            --primary-text-color: #94a3b8;
            --border-color: #1e293b;
            --label-color: #38bdf8;
            --secondary-bg-color: #0f172a;
            --secondary-highlight-color: #38bdf8;
            --tertiary-bg-color: #0f172a;
            --secondary-border-color: #334155;
            --image-bg-color: #1e293b;
            --border-color-1: #334155;
            --border-color-2: #334155;
            --border-color-3: #475569;
            --overlay-bg-color: #0f172a;
            --overlay-text-color: #94a3b8;
            --text-shadow-color: rgba(0,0,0,0.5);
            --timeline-bg-color: #1e293b;
            --timeline-border-color: #334155;
            --timeline-line-color: #334155;
            --tiled-bg-color: #1e293b;
            --tiled-border-color: #334155;
            --gradient-bg-1: rgba(56, 189, 248, 0.05);
            --quote-color: #38bdf8;
            --quote-marker-color: #334155;
            --bullet-bg-color: #1e293b;
            --bar-bg-color: #334155;
            --bar-text-color: #fff;
            --chart-summary-color: rgba(255,255,255,0.5);
            --gradient-blue-end: #38bdf8;
            --gradient-blue-start: #0ea5e9;
            --gradient-pink-end: #f472b6;
            --gradient-pink-start: #db2777;
            --gradient-purple-end: #c084fc;
            --gradient-purple-start: #9333ea;
            --line-color-2: #ffffff;
            --axis-label-color: #ffffff;
            --chart-border-color: #334155;
            --chart-container-bg: rgba(56, 189, 248, 0.03);
            --grid-line-color: #ffffff;
            --table-bg-color: #1e293b;
            --table-shadow-color: rgba(0,0,0,0.3);
            --th-bg-color: #334155;
            --th-color: #f8fafc;
            --accent: rgba(56, 189, 248, 0.03);
            --bg-light: #38bdf8;
            --primary: #0f172a;
            --secondary: #334155;
            --text-muted: #f8fafc;
            --chart-color-1: #38bdf8;
            --chart-color-2: #f8fafc;
            --chart-color-3: #94a3b8;
            --secondary-text-color: #94a3b8;
            --gradient-bg: rgba(56, 189, 248, 0.03);
            --code-bg-color: #1e293b;
            --code-color: #38bdf8;
            --tile-bg-color: #1e293b;
            --tile-border-color: #334155;
            --image-shadow-color: rgba(0,0,0,0.3);
            --image-border-color: #334155;
            --gradient-start: #ffffff;
            --gradient-end: #38bdf8;
            --subtitle-text-color: #cbd5e1;
            --code-block-bg: #0f172a;
            --code-block-border: #334155;
            --code-text-color-1: #94a3b8;
            --code-text-color-2: #7dd3fc;
            --code-text-color-3: #bae6fd;
        }

        * { box-sizing: border-box; }

        body {
          background-color: var(--body-color);
          display: grid;
          gap: 20px;
          grid-template-columns: 1fr;
          margin: 0;
          
          padding: 20px 0;
          place-items: center;
          font-family: 'Noto Sans SC', sans-serif;
    width: 1280px;
    min-height: 720px;
    overflow: hidden;
    position: relative;
}

        .slide-container {
          align-items: center;
          background-color: var(--primary-bg-color);
          border-radius: 16px;
          box-shadow: 0 20px 50px var(--shadow-color);
          display: flex;
          flex-direction: column;
          height: 720px;
          justify-content: center;
          overflow: hidden;
          padding: 60px;
          position: relative;
          width: 1280px;
          color: var(--text-color);
        }

        .slide-container::before {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle at 50% 50%, var(--gradient-bg), transparent 60%);
          z-index: 0;
          pointer-events: none;
        }

        .slide-container > * { position: relative; z-index: 1; }

        h1, h2, h3 { color: var(--title-color); font-weight: 700; margin: 0; }
        h1 { font-size: 72px; line-height: 1.1; margin-bottom: 20px; }
        h2 { font-size: 48px; margin-bottom: 40px; color: var(--highlight-color); }
        h3 { font-size: 32px; margin-bottom: 15px; color: var(--subtitle-color); }
        p, li { font-size: 22px; line-height: 1.6; color: var(--primary-text-color); margin-bottom: 15px; }

        code, .mono {
          font-family: 'JetBrains Mono', monospace;
          background: var(--code-bg-color);
          padding: 4px 8px;
          border-radius: 4px;
          color: var(--code-color);
          font-size: 0.9em;
        }

        .highlight { color: var(--highlight-color); font-weight: 600; }

        .title-layout { text-align: center; max-width: 900px; }
        .title-layout h1 {
          background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .title-layout .subtitle { font-size: 28px; color: var(--subtitle-text-color); margin-top: 20px; }

        .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; align-items: center; height: 100%; }
        .content-area { display: flex; flex-direction: column; justify-content: center; height: 100%; flex-grow: 1; width: 100%; }

        .image-wrapper { border-radius: 12px; overflow: hidden; height: 400px; width: 100%; box-shadow: 0 10px 30px var(--image-shadow-color); border: 1px solid var(--image-border-color); }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .tiled-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 100%; margin-top: 20px; }
        .tile { background: var(--tile-bg-color); border: 1px solid var(--tile-border-color); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: flex-start; transition: transform 0.2s; }
        .tile:hover { border-color: var(--highlight-color); transform: translateY(-5px); }
        .tile .icon { font-size: 36px; color: var(--highlight-color); margin-bottom: 20px; }

        .slide-container.bleed-image-layout { padding: 0; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; }
        .slide-container.bleed-image-layout .content-container { padding: 80px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .slide-container.bleed-image-layout .image-container { height: 100%; width: 100%; }
        .slide-container.bleed-image-layout img.bleed-image-side { height: 100%; width: 100%; max-height: 720px; object-fit: cover; }

        ul { list-style: none; padding: 0; }
        ul li { position: relative; padding-left: 35px; margin-bottom: 20px; }
        ul li::before { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: 0; top: 4px; color: var(--highlight-color); font-size: 20px; }

        .qa-layout { text-align: center; }
        .qa-layout h2 { font-size: 80px; color: #fff; }

        .slide-title { font-size: 52px; font-weight: 700; margin-bottom: 20px; width: 100%; text-align: left; }
        .two-column.tiled { align-items: stretch; }
        .two-column.tiled > div { background: var(--tile-bg-color); padding: 40px; border-radius: 24px; border: 1px solid var(--tile-border-color); display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .two-column.tiled h3 { color: var(--highlight-color); font-size: 40px; }

        .image-tile-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .image-tile { text-align: center; }
        .image-tile .image-wrapper { height: 250px; }
        .image-tile p { font-weight: 600; color: var(--primary-text-color); }

        .tiled-text-icons { display: flex; gap: 30px; width: 100%; align-items: stretch; }
        .icon-tile { flex: 1; background: var(--tile-bg-color); border-radius: 24px; padding: 30px; text-align: center; border-bottom: 8px solid var(--border-color); }
        .icon-tile:nth-child(1) { border-color: var(--border-color-1); }
        .icon-tile:nth-child(2) { border-color: var(--border-color-2); }
        .icon-tile:nth-child(3) { border-color: var(--border-color-3); }
        .icon-tile .icon { font-size: 50px; color: var(--highlight-color); margin-bottom: 20px; }

        .highlight-number { text-align: center; width: 100%; }
        .big-number { font-size: 140px; font-weight: 700; background: linear-gradient(to right, var(--gradient-start), var(--gradient-end)); background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 10px; }
        .number-label { font-size: 30px; font-weight: 600; color: var(--label-color); margin-bottom: 30px; }

        .bleed-text-side { padding: 20px 60px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .bleed-text-side p { font-size: 14px; }

        .full-bg-image { padding: 0; background-size: cover; background-position: center; position: relative; }
        .full-bg-image::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1; }
        .full-bg-image h2 { color: var(--highlight-color); font-size: 80px; margin-bottom: 10px; text-shadow: 2px 2px 4px var(--text-shadow-color); }
        .overlay-text { background: var(--tile-bg-color); padding: 40px 80px; border-radius: 30px; color: var(--overlay-text-color); text-align: center; position: relative; z-index: 2; }

        .timeline-container { position: relative; display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 50px; padding: 0 40px; }
        .timeline-line { position: absolute; top: 50%; left: 0; width: 100%; height: 6px; background: var(--timeline-line-color); transform: translateY(-50%); z-index: 0; }
        .timeline-item { position: relative; z-index: 1; text-align: center; background: var(--timeline-bg-color); border: 3px solid var(--timeline-border-color); border-radius: 20px; padding: 20px; width: 22%; }
        .timeline-item h3 { font-size: 28px; color: var(--highlight-color); margin-bottom: 10px; }
        .timeline-item p { font-size: 18px; line-height: 1.3; }

        .quote-layout { margin: 0 auto; text-align: center; width: 80%; }
        .quote-layout blockquote { color: var(--quote-color); font-size: 42px; font-weight: 300; line-height: 1.4; margin: 0 0 30px 0; padding: 0 60px; position: relative; }
        .quote-layout blockquote::before { color: var(--quote-marker-color); content: '\201C'; font-size: 150px; line-height: 0; position: absolute; left: -20px; top: 40px; }
        .quote-layout blockquote::after { color: var(--quote-marker-color); content: '\201D'; font-size: 150px; line-height: 0; position: absolute; bottom: -20px; right: -20px; }
        .quote-layout cite { color: var(--highlight-color); font-size: 24px; font-style: normal; font-weight: 600; display: block; margin-top: 20px; }

        .bullet-list { max-width: 900px; width: 100%; }
        .bullet-list ul { list-style: none; margin: 0; padding: 0; }
        .bullet-list li { gap: 15px; margin-bottom: 25px; padding-left: 50px; position: relative; background: var(--bullet-bg-color); padding: 20px 20px 20px 60px; border-radius: 8px; border-left: 4px solid var(--border-color); }
        .bullet-list i { color: var(--highlight-color); font-size: 24px; left: 20px; margin-top: -12px; position: absolute; top: 50%; text-align: center; }
        .bullet-list li strong { color: var(--title-color); font-weight: 700; }

        .chart-container { display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 900px; }
        .bar { align-items: center; display: flex; gap: 20px; }
        .bar .label { color: var(--primary-text-color); flex: 0 0 200px; font-weight: 600; text-align: right; font-size: 20px; }
        .bar .bar-inner { background-color: var(--bar-bg-color); border-radius: 6px; flex-grow: 1; height: 40px; overflow: hidden; }
        .bar .bar-fill { align-items: center; border-radius: 6px; color: var(--bar-text-color); display: flex; font-size: 16px; font-weight: 700; height: 100%; justify-content: flex-end; padding-right: 15px; }
        .chart-summary { font-style: italic; margin-top: 20px; text-align: center; color: var(--chart-summary-color); font-size: 20px; }

        .table-layout { width: 100%; background-color: var(--table-bg-color); border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px var(--table-shadow-color); }
        .table-layout table { width: 100%; border-collapse: collapse; }
        .table-layout th, .table-layout td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .table-layout th { background-color: var(--th-bg-color); color: var(--th-color); font-size: 28px; }

        .doughnut-chart-container { display: flex; align-items: center; justify-content: center; gap: 100px; width: 100%; }
        .doughnut-chart { width: 380px; height: 380px; border-radius: 50%; position: relative; }
        .legend { list-style: none; padding: 0; }
        .legend li { display: flex; align-items: center; margin-bottom: 15px; font-size: 22px; }
        .color-box { width: 24px; height: 24px; border-radius: 4px; margin-right: 15px; }
  </style>
</head>

<div class="slide-container" id="slide5">
  <div class="qa-layout">
    <h2>Gracias por su atención</h2>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <div style="margin-top: 40px; color: var(--primary-text-color);">
      <i class="fa-solid fa-envelope"></i> contacto@loremipsum.com<br/>
      <i class="fa-solid fa-globe"></i> www.plantillavisual.com
    </div>
  </div>
</div>


</body></html>
